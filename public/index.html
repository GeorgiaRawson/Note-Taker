<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Notes List</h1>
        <ul id="note-list"></ul>
        <form id="note-form">
            <input type="text" id="note-input" placeholder="Enter new note" required>
            <button type="submit">Add Note</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
